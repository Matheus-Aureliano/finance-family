<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Cadastro - FinanceFamily</title>
</head>
<body>
    <div class="container">
        <img src="https://cdn-icons-png.flaticon.com/512/3534/3534139.png" style="width: 70px; margin-bottom: 15px;">
        <h1>Criar Conta</h1>
        <form id="formCadastro">
            <input type="text" id="nomeReg" placeholder="Nome da Família" required>
            <input type="email" id="emailReg" placeholder="E-mail" required>
            <input type="password" id="senhaReg" placeholder="Senha" required>
            <button type="submit">Finalizar Cadastro</button>
        </form>
        <p style="margin-top: 15px; font-size: 0.8rem;">Já tem conta? <a href="index.html">Entrar</a></p>
    </div>

    <script>
        document.getElementById('formCadastro').addEventListener('submit', function(e) {
            e.preventDefault();
            localStorage.setItem('userName', document.getElementById('nomeReg').value);
            localStorage.setItem('userEmail', document.getElementById('emailReg').value);
            localStorage.setItem('userPass', document.getElementById('senhaReg').value);
            alert("Sucesso! Agora faça login.");
            window.location.href = "index.html";
        });
    </script>
</body>
</html>
